      - name: 🏷️ Bump Version
        id: bump
        run: |
          cd packages/tanstack-router
          pnpm version ${{ github.event.inputs.bump_type }} --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 🔨 Build
