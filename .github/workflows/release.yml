          token: ${{ secrets.THUNDERID_AUTOMATION_BOT }}

      - name: 📦 Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: latest

      - name: ⚙️ Set up Node.js
