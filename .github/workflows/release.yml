          git config user.email "${{ env.RELEASE_GIT_USER_EMAIL }}"
          git add packages/node/package.json
          git diff --cached --quiet || git commit -m "[Release] @thunderid/node@${{ steps.bump.outputs.version }}"
          for i in $(seq 1 5); do
